<!DOCTYPE html>
<html>
<head>
    <title>Jaylen Johnson Resume</title>
    <style>
        body {
            background-color: #8a9f92;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            font-family: "Lucida Console", "Courier New", monospace;
            margin-top: 15px;
        }

        #header {
            background-color: #7db0b0;
            width: 95%;
            margin: 15px auto;
            padding-bottom: 15px;
        }

        #header h2 {
            text-align: center;
            padding: 10px 0;
            margin: 0;
            font-weight: bold;
        }

        .boxes {
            display: flex;
            width: 98%;
            margin: 0 auto;
            background-color: #c6d7d3;
            border: 2px solid #7db0b0;
        }

        .box {
            padding: 20px;
            box-sizing: border-box;
            min-height: 170px;
        }

        #edu {
            width: 25%;
            background-color: #f4f4f4;
        }

        #exp {
            width: 50%;
            text-align: center;
			background-color: #21abcd; 
        }

        #contact {
            width: 25%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
			background-color: #21abcd; 
        }

        #edu h3 {
            text-align: center;
            margin-top: 0;
        }

        #edu a {
            display: block;
            margin: 8px 0;
            color: blue;
        }

        .form-group {
            margin: 10px 0;
        }

        input {
            width: 120px;
        }

        button {
            margin-top: 10px;
        }

        footer {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h1>Jaylen Johnson Resume</h1>

    <div id="header">
        <h2>Salary Calculator</h2>

        <div class="boxes">
            <div id="edu" class="box">
                <h3>Navagation</h3>
                <a href="assignment_2.html">Work Experience</a>
                <a href="education.html">Educational Experience</a>
                <a href="rewards.html">Related Awards and Skills</a>
                <a href="assignment_3.html">Salary Calculator</a>
            </div>

            <div id="exp" class="box">
                <p>Please fill out the information below to see how much of a salary an hourly wage equals.</p>

                <div class="form-group">
                    <label>Enter the hourly rate: </label>
                    <input type="text" id="hourlyRate">
                </div>

                <div class="form-group">
                    <label>Enter hours per week: </label>
                    <input type="text" id="hoursPerWeek">
                </div>

                <button onclick="theFunction()">Check</button>

                <p>The salary is:</p>
                <p id="change"></p>
            </div>

            <div id="contact" class="box">
                <p>Coming Soon</p>
            </div>
        </div>

        <footer>
            <a href="mailto:jayandjohnson2510@gmail.com">Email me!</a>
        </footer>
    </div>

    <script type="text/javascript">
        
    function theFunction() {
        var hourly = document.getElementById("hourlyRate").value;
        var hours = document.getElementById("hoursPerWeek").value;
        var salary = hourly * hours * 52;
        var message;


        if (salary < 20000) {
            message = "The salary is too little.";
        } else if (salary >= 20000 && salary <= 25000) {
            message = "The salary is almost enough. Let’s negotiate.";
        } else {
            message = "This is a great salary for me.";
        }

        document.getElementById("change").innerHTML = "$" + salary + message;
    }
        }
    </script>

</body>
</html>
